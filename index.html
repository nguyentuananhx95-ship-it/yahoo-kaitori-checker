<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Yahoo Kaitori Checker</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <h1>Yahoo Kaitori Checker</h1>

    <p class="description">
      Dán link sản phẩm Yahoo Shopping để kiểm tra.
    </p>

    <input
      id="url"
      type="url"
      placeholder="https://store.shopping.yahoo.co.jp/..."
      autocomplete="off"
    >

    <button id="checkBtn" type="button">
      Kiểm tra
    </button>

    <div id="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
